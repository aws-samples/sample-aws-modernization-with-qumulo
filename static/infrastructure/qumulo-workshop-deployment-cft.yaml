AWSTemplateFormatVersion: '2010-09-09'
Description: Qumulo Workshop Environment Setup with Initial Cluster Deployment via Terraform

Parameters:
  QumuloAccountId:
    Type: String
    Description: Qumulo account ID containing the Lambda function
    Default: "026847022493"
  
  QumuloLambdaFunctionName:
    Type: String
    Description: Name of the Lambda function in Qumulo account
    Default: "workshop_distribution"
  
  QumuloExternalId:
    Type: String
    Description: External ID for secure Lambda invocation
    Default: "0aGc1269bB5vEYxdzbKtFyijQn6RZ6jHzFvapWll"
    NoEcho: true

Resources:

  QumuloVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: qumulo-workshop-vpc

  VPCFlowLogsKmsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: KMS key for encrypting VPC flow logs
      EnableKeyRotation: true
      KeyPolicy:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowAccountUse
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

          # Allow CloudWatch Logs service to encrypt with this key
          - Sid: AllowCloudWatchLogsUseOfTheKey
            Effect: Allow
            Principal:
              Service: !Sub "logs.${AWS::Region}.amazonaws.com"
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:ReEncrypt*
              - kms:GenerateDataKey*
              - kms:CreateGrant
              - kms:DescribeKey
            Resource: "*"
            Condition:
              ArnLike:
                kms:EncryptionContext:aws:logs:arn: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:*"


  # CloudWatch Logs log group for VPC Flow Logs (now encrypted)
  VPCFlowLogsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/vpc/flow-logs/${QumuloVPC}"
      RetentionInDays: 14
      KmsKeyId: !GetAtt VPCFlowLogsKmsKey.Arn

  # IAM role for VPC Flow Logs, scoped to this log group (fixes W11)
  VPCFlowLogsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: VPCFlowLogsToCloudWatch
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/vpc/flow-logs/${QumuloVPC}:*"
      Tags:
        - Key: Name
          Value: qumulo-vpc-flowlogs-role

  # VPC Flow Log
  QumuloVPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref QumuloVPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogsLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogsRole.Arn
      MaxAggregationInterval: 600
      Tags:
        - Key: Name
          Value: qumulo-vpc-flowlog

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: qumulo-workshop-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref QumuloVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref QumuloVPC
      CidrBlock: 10.0.0.0/20
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: qumulo-workshop-subnet-public1

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref QumuloVPC
      CidrBlock: 10.0.16.0/20
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: qumulo-workshop-subnet-public2

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref QumuloVPC
      CidrBlock: 10.0.32.0/20
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: qumulo-workshop-subnet-public3

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref QumuloVPC
      CidrBlock: 10.0.128.0/20
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: qumulo-workshop-subnet-private1

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref QumuloVPC
      CidrBlock: 10.0.144.0/20
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: qumulo-workshop-subnet-private2

  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref QumuloVPC
      CidrBlock: 10.0.160.0/20
      AvailabilityZone: !Select [2, !GetAZs '']
      Tags:
        - Key: Name
          Value: qumulo-workshop-subnet-private3


  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref QumuloVPC
      Tags:
        - Key: Name
          Value: qumulo-workshop-rtb-public

  PublicRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  # Associate public subnets with public route table
  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref PublicRouteTable

  EIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: qumulo-workshop-eip

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt EIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags:
        - Key: Name
          Value: qumulo-workshop-nat-public1

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref QumuloVPC
      Tags:
        - Key: Name
          Value: qumulo-workshop-rtb-private1

  PrivateRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref QumuloVPC
      Tags:
        - Key: Name
          Value: qumulo-workshop-rtb-private2

  PrivateRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateRouteTableC:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref QumuloVPC
      Tags:
        - Key: Name
          Value: qumulo-workshop-rtb-private3

  PrivateRouteC:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableC
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  # Associate private subnets with their route tables
  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  PrivateSubnetCRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetC
      RouteTableId: !Ref PrivateRouteTableC

  VPCEndpointS3:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref QumuloVPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB
        - !Ref PrivateRouteTableC
      Tags:
        - Key: Name
          Value: qumulo-workshop-vpce-s3

  # New EC2 KeyPair resource
  QumuloWorkshopKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: qumulo-workshop-keypair
      Tags:
        - Key: Name
          Value: qumulo-workshop-keypair

  #QumuloSecretsManager Password Declaration
  QumuloEnvironmentPassword:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${AWS::StackName}-QumuloAdmin"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "Administrator"}'
        GenerateStringKey: "password"
        PasswordLength: 16
        RequireEachIncludedType: true
        ExcludeCharacters: "'\"\\/@$`{}[]|&;()!^%><=,~#?*+"

  EC2SSMRole:
    Type: AWS::IAM::Role
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W11
            reason: "Many operations require wildcard resources (e.g., ec2:Describe*, sts:GetCallerIdentity, route53:List*). These are read-only or account-level operations that cannot be scoped to specific resources per AWS IAM documentation."
          - id: W76
            reason: "High SPCM required for comprehensive Qumulo workshop automation spanning EC2, ELB, IAM, Route53, S3, and SSM. Policy is properly scoped with namespace restrictions where possible (S3: *qumulo*/*qps*, SSM: /qumulo/*, PassRole: qum-*-qumulo-*). Time-limited workshop context with cleanup procedures."
          - id: W40
            reason: "Allowing all egress protocols is standard AWS best practice. Instances need outbound access to AWS APIs (HTTPS), package repos (HTTP/HTTPS), DNS (UDP 53), NTP (UDP 123), and Qumulo management endpoints. Security enforced via ingress rules (VPC-only), IAM role restrictions, and SSM Session Manager authentication."
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

      Policies:
        - PolicyName: QumuloWorkshopPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              # ------------------------------------------------------------------
              # Workshop: utility bucket access (scoped to this bucket)
              # Used by setup-workshop-environment.sh to read Qumulo version, etc.
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:GetBucketVersioning
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource:
                  - !Sub "arn:aws:s3:::${WorkshopUtilityBucket}"
                  - !Sub "arn:aws:s3:::${WorkshopUtilityBucket}/*"

              # ------------------------------------------------------------------
              # Workshop: SSM parameter access (stack + keypair)
              # /${StackName}/* for environment; /ec2/keypair/* for SSH private key
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/*"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/ec2/keypair/*"

              # ------------------------------------------------------------------
              # S3 - Qumulo/QPS buckets (scoped to Qumulo namespaces)
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:DeleteBucket
                  - s3:DeleteBucketPolicy
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:GetAccelerateConfiguration
                  - s3:GetBucketAcl
                  - s3:GetBucketCORS
                  - s3:GetBucketLocation
                  - s3:GetBucketLogging
                  - s3:GetBucketObjectLockConfiguration
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketRequestPayment
                  - s3:GetBucketTagging
                  - s3:GetBucketVersioning
                  - s3:GetBucketWebsite
                  - s3:GetEncryptionConfiguration
                  - s3:GetLifecycleConfiguration
                  - s3:GetObject
                  - s3:GetObjectTagging
                  - s3:GetObjectVersion
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:PutBucketLogging
                  - s3:PutBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketTagging
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:PutLifecycleConfiguration
                  - s3:PutObject
                Resource:
                  - arn:aws:s3:::*qumulo*
                  - arn:aws:s3:::*qumulo*/*
                  - arn:aws:s3:::*qps*
                  - arn:aws:s3:::*qps*/*

              # ------------------------------------------------------------------
              # SSM Parameter Store - Qumulo namespace
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - ssm:AddTagsToResource
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameterHistory
                  - ssm:GetParameters
                  - ssm:ListTagsForResource
                  - ssm:PutParameter
                  - ssm:RemoveTagsFromResource
                Resource:
                  - arn:aws:ssm:*:*:parameter/qumulo/*

              # ------------------------------------------------------------------
              # SSM SendCommand - resource scoped to AWS documents and instances
              # needed for automation scripts
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - ssm:CancelCommand
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:ListCommands
                  - ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/AWS-*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/*"

              # ------------------------------------------------------------------
              # Secrets Manager - Qumulo secrets
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - secretsmanager:CreateSecret
                  - secretsmanager:DeleteResourcePolicy
                  - secretsmanager:DeleteSecret
                  - secretsmanager:DescribeSecret
                  - secretsmanager:GetResourcePolicy
                  - secretsmanager:GetSecretValue
                  - secretsmanager:PutResourcePolicy
                  - secretsmanager:PutSecretValue
                  - secretsmanager:RotateSecret
                  - secretsmanager:TagResource
                  - secretsmanager:UntagResource
                  - secretsmanager:UpdateSecret
                  - secretsmanager:UpdateSecretVersionStage
                Resource:
                  - arn:aws:secretsmanager:*:*:secret:/qumulo/*
                  - arn:aws:secretsmanager:*:*:secret:qumulo-*
                  - !Sub "arn:aws:secretsmanager:*:*:secret:${AWS::StackName}-QumuloAdmin-*"

              # ------------------------------------------------------------------
              # Route53 - DNS management (scoped to hosted zones)
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - route53:ChangeResourceRecordSets
                  - route53:ChangeTagsForResource
                  - route53:CreateHostedZone
                  - route53:DeleteHostedZone
                  - route53:GetChange
                  - route53:GetHostedZone
                  - route53:ListHostedZones
                  - route53:ListHostedZonesByName
                  - route53:ListResourceRecordSets
                  - route53:ListTagsForResource
                  - route53:UpdateHostedZoneComment
                Resource:
                  - arn:aws:route53:::hostedzone/*
                  - arn:aws:route53:::change/*

              # ------------------------------------------------------------------
              # IAM PassRole - scoped to Qumulo-created roles ONLY
              # required for Terraform to create
              # instance profiles. Scoped to avoid cfn-nag F38 warning.
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource:
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/qum-*-qumulo-cluster"
                  - !Sub "arn:aws:iam::${AWS::AccountId}:role/qum-*-qumulo-provisioner"
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - ec2.amazonaws.com

              # ------------------------------------------------------------------
              # Core permissions with wildcard resources
              # Includes: EC2, ELB, IAM (except PassRole), CloudWatch, Route53,
              #           Resource Groups, KMS, STS, CloudFormation, and Tags
              # ------------------------------------------------------------------
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStackResources
                  - cloudformation:DescribeStacks
                  - ec2:AllocateAddress
                  - ec2:AssociateAddress
                  - ec2:AttachNetworkInterface
                  - ec2:AttachVolume
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:CreateNetworkInterface
                  - ec2:CreatePlacementGroup
                  - ec2:CreateSecurityGroup
                  - ec2:CreateTags
                  - ec2:CreateVolume
                  - ec2:DeleteNetworkInterface
                  - ec2:DeletePlacementGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:DeleteTags
                  - ec2:DeleteVolume
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAddresses
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeImages
                  - ec2:DescribeInstanceAttribute
                  - ec2:DescribeInstanceCreditSpecifications
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeInstanceTypes
                  - ec2:DescribeInstances
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeKeyPairs
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribePlacementGroups
                  - ec2:DescribePrefixLists
                  - ec2:DescribeRouteTables
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeSnapshots
                  - ec2:DescribeSubnets
                  - ec2:DescribeTags
                  - ec2:DescribeVolumeAttribute
                  - ec2:DescribeVolumes
                  - ec2:DescribeVolumesModifications
                  - ec2:DescribeVpcAttribute
                  - ec2:DescribeVpcEndpoints
                  - ec2:DescribeVpcs
                  - ec2:DetachNetworkInterface
                  - ec2:DetachVolume
                  - ec2:DisassociateAddress
                  - ec2:GetInstanceUefiData
                  - ec2:ModifyInstanceAttribute
                  - ec2:ModifyInstanceCreditSpecification
                  - ec2:ModifyInstanceMetadataOptions
                  - ec2:ModifyNetworkInterfaceAttribute
                  - ec2:ModifyVolume
                  - ec2:ModifyVolumeAttribute
                  - ec2:RebootInstances
                  - ec2:ReleaseAddress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:RunInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:TerminateInstances
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:DescribeCapacityReservation
                  - elasticloadbalancing:DescribeListenerAttributes
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:RemoveTags
                  - elasticloadbalancing:SetSecurityGroups
                  - iam:AddRoleToInstanceProfile
                  - iam:AttachRolePolicy
                  - iam:CreateInstanceProfile
                  - iam:CreatePolicy
                  - iam:CreateRole
                  - iam:DeleteInstanceProfile
                  - iam:DeletePolicy
                  - iam:DeleteRole
                  - iam:DeleteRolePolicy
                  - iam:DetachRolePolicy
                  - iam:GetInstanceProfile
                  - iam:GetPolicy
                  - iam:GetPolicyVersion
                  - iam:GetRole
                  - iam:GetRolePolicy
                  - iam:ListAttachedRolePolicies
                  - iam:ListInstanceProfilesForRole
                  - iam:ListPolicyVersions
                  - iam:ListRolePolicies
                  - iam:ListRoleTags
                  - iam:ListRoles
                  - iam:PutRolePolicy
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:UpdateAssumeRolePolicy
                  - iam:UpdateRole
                  - kms:CreateGrant
                  - kms:Decrypt
                  - kms:Encrypt
                  - kms:GenerateDataKey
                  - kms:GenerateDataKeyWithoutPlaintext
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                  - logs:TagLogGroup
                  - logs:UntagLogGroup
                  - resource-groups:CreateGroup
                  - resource-groups:DeleteGroup
                  - resource-groups:GetGroup
                  - resource-groups:GetGroupConfiguration
                  - resource-groups:GetGroupQuery
                  - resource-groups:GetTags
                  - resource-groups:Tag
                  - resource-groups:Untag
                  - resource-groups:UpdateGroup
                  - route53:GetHostedZoneCount
                  - route53:ListHostedZones
                  - route53:ListHostedZonesByName
                  - route53resolver:AssociateResolverRule
                  - route53resolver:CreateResolverEndpoint
                  - route53resolver:CreateResolverRule
                  - route53resolver:DeleteResolverEndpoint
                  - route53resolver:DeleteResolverRule
                  - route53resolver:DisassociateResolverRule
                  - route53resolver:GetResolverEndpoint
                  - route53resolver:GetResolverRule
                  - route53resolver:ListResolverEndpoints
                  - route53resolver:ListResolverRules
                  - route53resolver:TagResource
                  - route53resolver:UntagResource
                  - route53resolver:UpdateResolverEndpoint
                  - route53resolver:UpdateResolverRule
                  - ssm:DescribeInstanceInformation
                  - ssm:DescribeParameters
                  - ssm:ListInstanceAssociations
                  - ssm:UpdateInstanceInformation
                  - sts:GetCallerIdentity
                  - tag:GetResources
                Resource: "*"

      Tags:
        - Key: Name
          Value: EC2-SSM-Qumulo-Workshop-Role

  EC2SSMInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2SSMRole
  
  # Private Hosted Zone for Workshop DNS
  QumuloWorkshopPrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: qumulo.local
      VPCs:
        - VPCId: !Ref QumuloVPC
          VPCRegion: !Ref AWS::Region
      HostedZoneConfig:
        Comment: "Private hosted zone for Qumulo workshop DNS resolution"
      HostedZoneTags:
        - Key: Name
          Value: qumulo-workshop-private-zone
  
  DefaultInstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W9
            reason: "VPC CIDR (10.0.0.0/16) required for dynamic multi-instance communication. Workshop deploys Qumulo clusters (4+ nodes), Windows workstation, NLB, and automation instances with DHCP-assigned IPs. Using /32 would break Terraform automation and scaling operations. VPC is isolated private network - not internet accessible."
          - id: W5
            reason: "Egress to 0.0.0.0/0 required for AWS service APIs, package repositories, Terraform providers, and software downloads. Follows AWS default security group pattern. Security enforced via ingress restrictions (VPC-only), IAM role scoping, and SSM Session Manager authentication. No public IPs assigned to instances."
          - id: W42
            reason: "Allowing all egress protocols is standard AWS best practice. Instances need outbound access to AWS APIs (HTTPS), package repos (HTTP/HTTPS), DNS (UDP 53), NTP (UDP 123), and Qumulo management endpoints. Security enforced via ingress rules (VPC-only), IAM role restrictions, and SSM Session Manager authentication."
          - id: W40
            reason: "Allowing all egress protocols is standard AWS best practice. Instances need outbound access to AWS APIs (HTTPS), package repos (HTTP/HTTPS), DNS (UDP 53), NTP (UDP 123), and Qumulo management endpoints. Security enforced via ingress rules (VPC-only), IAM role restrictions, and SSM Session Manager authentication."
    Properties:
      GroupDescription: Instance SG
      VpcId: !Ref QumuloVPC
      SecurityGroupIngress:
        - IpProtocol: -1
          CidrIp: 10.0.0.0/16
          Description: Allow all traffic from VPC CIDR range
